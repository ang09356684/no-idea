name: weekly-sync

# 每週自動 sync 共用活動 catalog，把 data/combined/*.json commit 回 repo，
# 觸發 Vercel 自動部署，讓線上資料每週更新。本機手動同步請用 `npm run sync`。
on:
  schedule:
    # cron 走 UTC：週日 16:00 UTC = 週一 00:00 台灣時間（UTC+8）
    - cron: "0 16 * * 0"
  workflow_dispatch: {} # 可在 Actions 頁面手動觸發

concurrency:
  group: weekly-sync
  cancel-in-progress: false

permissions:
  contents: write # 讓內建 GITHUB_TOKEN 能 commit / push 回 repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # kktix 來源用 Playwright，需要 Chromium
      - run: npx playwright install --with-deps chromium

      - run: npm run sync

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/combined
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): weekly auto-sync"
            git push
          fi
